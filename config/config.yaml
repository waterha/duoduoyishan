server:
  port: "8080"
  mode: "debug"

database:
  host: "mysql"
  port: "3306"
  username: "duoduoyishan"
  password: "123456"
  database: "duoduoyishan"
  charset: "utf8mb4"
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: "redis"
  port: "6379"
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: "your-256-bit-secret-key-change-in-production"
  expire_time: 86400  # 24小时，单位秒

upload:
  max_size: 10485760  # 10MB
  save_path: "./uploads"
  allow_exts:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".mp4"
    - ".mp3"
    - ".pdf"
    - ".doc"
    - ".docx"

log:
  level: "info"
  filename: "./logs/app.log"
  max_size: 100  # MB
  max_backups: 30
  max_age: 30    # 天