<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多多益善 - 社交平台</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- 登录/注册页面 -->
        <div id="auth-page" class="auth-container">
            <div class="auth-box">
                <div class="auth-header">
                    <h1>多多益善</h1>
                    <p>简约社交，连接你我</p>
                </div>
                
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">登录</button>
                    <button class="tab-btn" onclick="switchTab('register')">注册</button>
                </div>
                
                <!-- 登录表单 -->
                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="login-username" placeholder="用户名" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="密码" required>
                    </div>
                    <button type="submit" class="btn-primary">登录</button>
                </form>
                
                <!-- 注册表单 -->
                <form id="register-form" class="auth-form" style="display: none;">
                    <div class="form-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="register-username" placeholder="用户名 (3-50字符)" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="register-email" placeholder="邮箱" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="register-password" placeholder="密码 (至少6位)" required>
                    </div>
                    <button type="submit" class="btn-primary">注册</button>
                </form>
            </div>
        </div>
        
        <!-- 主应用页面 -->
        <div id="main-page" class="main-container" style="display: none;">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-info">
                        <h3 id="user-nickname">用户名</h3>
                        <span id="user-status" class="status-online">在线</span>
                    </div>
                </div>
                
                <div class="sidebar-menu">
                    <div class="menu-item active" onclick="switchPage('chat')">
                        <i class="fas fa-comments"></i>
                        <span>聊天</span>
                    </div>
                    <div class="menu-item" onclick="switchPage('friends')">
                        <i class="fas fa-user-friends"></i>
                        <span>好友</span>
                        <span class="badge" id="friend-request-badge" style="display: none;">0</span>
                    </div>
                    <div class="menu-item" onclick="switchPage('community')">
                        <i class="fas fa-users"></i>
                        <span>社区</span>
                    </div>
                    <div class="menu-item" onclick="switchPage('profile')">
                        <i class="fas fa-cog"></i>
                        <span>设置</span>
                    </div>
                </div>
                
                <div class="sidebar-footer">
                    <button class="btn-logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        退出登录
                    </button>
                </div>
            </div>
            
            <!-- 主内容区域 -->
            <div class="main-content">
                <!-- 聊天页面 -->
                <div id="chat-page" class="page active">
                    <div class="chat-container">
                        <div class="chat-list">
                            <div class="chat-list-header">
                                <h3>聊天列表</h3>
                                <button class="btn-icon" onclick="showSearchUser()">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                            <div class="chat-type-tabs">
                                <button class="chat-type-btn active" onclick="switchChatType('private')">私聊</button>
                                <button class="chat-type-btn" onclick="switchChatType('community')">社区</button>
                            </div>
                            <div class="chat-list-items" id="chat-list-items">
                                <!-- 聊天列表项将在这里动态生成 -->
                            </div>
                        </div>
                        <div class="chat-window">
                            <div class="chat-window-header">
                                <h3 id="chat-window-title">选择一个聊天</h3>
                                <span id="chat-type-indicator" class="chat-type-indicator"></span>
                            </div>
                            <div class="chat-messages" id="chat-messages">
                                <div class="chat-empty">
                                    <i class="fas fa-comments"></i>
                                    <p>选择一个聊天开始对话</p>
                                </div>
                            </div>
                            <div class="chat-input">
                                <input type="text" id="message-input" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                                <button class="btn-send" onclick="sendMessage()">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 好友页面 -->
                <div id="friends-page" class="page">
                    <div class="friends-container">
                        <div class="friends-header">
                            <h3>好友列表</h3>
                            <button class="btn-primary" onclick="showAddFriend()">
                                <i class="fas fa-user-plus"></i> 添加好友
                            </button>
                        </div>
                        
                        <div class="friends-tabs">
                            <button class="tab-btn active" onclick="switchFriendTab('list')">好友列表</button>
                            <button class="tab-btn" onclick="switchFriendTab('requests')">好友请求</button>
                        </div>
                        
                        <div id="friends-list" class="friends-list">
                            <!-- 好友列表将在这里动态生成 -->
                        </div>
                        
                        <div id="friend-requests" class="friends-list" style="display: none;">
                            <!-- 好友请求将在这里动态生成 -->
                        </div>
                    </div>
                </div>
                
                <!-- 社区页面 -->
                <div id="community-page" class="page">
                    <div class="community-container">
                        <div class="community-header">
                            <h3>社区</h3>
                            <button class="btn-primary" onclick="showCreateCommunity()">
                                <i class="fas fa-plus"></i> 创建社区
                            </button>
                        </div>
                        
                        <div class="community-tabs">
                            <button class="tab-btn active" onclick="switchCommunityTab('all')">全部社区</button>
                            <button class="tab-btn" onclick="switchCommunityTab('my')">我的社区</button>
                        </div>
                        
                        <div id="community-list" class="community-list">
                            <!-- 社区列表将在这里动态生成 -->
                        </div>
                    </div>
                </div>
                
                <!-- 设置页面 -->
                <div id="profile-page" class="page">
                    <div class="profile-container">
                        <h3>个人设置</h3>
                        
                        <div class="profile-form">
                            <div class="form-group">
                                <label>昵称</label>
                                <input type="text" id="profile-nickname" placeholder="昵称">
                            </div>
                            <div class="form-group">
                                <label>个性签名</label>
                                <textarea id="profile-signature" placeholder="个性签名"></textarea>
                            </div>
                            <div class="form-group">
                                <label>性别</label>
                                <select id="profile-gender">
                                    <option value="0">未知</option>
                                    <option value="1">男</option>
                                    <option value="2">女</option>
                                </select>
                            </div>
                            <button class="btn-primary" onclick="updateProfile()">保存修改</button>
                        </div>
                        
                        <div class="profile-divider"></div>
                        
                        <div class="password-form">
                            <h4>修改密码</h4>
                            <div class="form-group">
                                <label>旧密码</label>
                                <input type="password" id="old-password" placeholder="旧密码">
                            </div>
                            <div class="form-group">
                                <label>新密码</label>
                                <input type="password" id="new-password" placeholder="新密码">
                            </div>
                            <button class="btn-primary" onclick="changePassword()">修改密码</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 模态框 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">标题</h3>
                <button class="btn-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- 模态框内容将在这里动态生成 -->
            </div>
        </div>
    </div>
    
    <!-- 提示消息 -->
    <div id="toast" class="toast"></div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
